name: CD
run-name: CD - ${{ github.event.release.tag_name }}

on:
  workflow_dispatch:
  release:
    types: [published]

defaults:
  run:
    working-directory: src

jobs:
  build_test_pack_push:
    name: 🛠️ Build, 🧪 Test, 📦 Pack & 🚚 Push
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      # - name: setup dotnet
